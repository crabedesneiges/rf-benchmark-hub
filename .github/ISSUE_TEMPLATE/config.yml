# Disable "blank" issues so contributors pick one of the structured templates
# (bug_report / feature_request / submission / task_proposal).
blank_issues_enabled: false

# GitHub requires ABSOLUTE https URLs here. The Discussions link only appears once
# the Discussions feature is enabled in repo Settings.
contact_links:
  - name: Security vulnerability
    url: https://github.com/crabedesneiges/rf-benchmark-hub/blob/main/SECURITY.md
    about: Do NOT open a public issue for security problems — follow SECURITY.md (private reporting).
  - name: Question / discussion
    url: https://github.com/crabedesneiges/rf-benchmark-hub/discussions
    about: For usage questions or open-ended discussion, use the Discussions tab.
