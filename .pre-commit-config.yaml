# Pre-commit hooks for RF-Benchmark-Hub.
# Install with: pre-commit install
# Run on all files: pre-commit run --all-files
# Ruff (lint + import sort) and Black share line-length 100 with pyproject.toml.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
        # We rely on Black for formatting; keep ruff-format available but let Black own the diff.
        stages: [manual]

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=512]
